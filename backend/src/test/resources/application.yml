spring:
  datasource:
    url: jdbc:h2:mem:malssumbeot;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

malssumbeot:
  bible:
    import-file: ""
  anthropic:
    api-key: test-key
    classifier-model: claude-haiku-4-5
    faith-model: claude-sonnet-4-6
    casual-model: claude-haiku-4-5
  chat:
    rate-limit:
      max-requests: 30
      window: 1h
  auth:
    google:
      client-id: test-google-client-id
    kakao:
      user-info-uri: https://kapi.kakao.com/v2/user/me
    jwt:
      secret: test-secret-key-that-is-at-least-32-bytes-long
      ttl: P30D
