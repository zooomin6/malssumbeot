spring:
  application:
    name: malssumbeot
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55432/malssumbeot}
    username: ${DB_USERNAME:malssumbeot}
    password: ${DB_PASSWORD:malssumbeot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

malssumbeot:
  bible:
    # bible-import 프로파일에서 사용. TSV 형식: 책약어<TAB>장<TAB>절<TAB>본문
    import-file: ${BIBLE_IMPORT_FILE:}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    # 모델 라우팅 (PRD §6.2 단위 경제성: Haiku/Sonnet 혼용, D-010·D-013)
    classifier-model: claude-haiku-4-5
    # 신앙 상담·지식QA·기도문·위기 응답
    faith-model: claude-sonnet-4-6
    # 일상 대화·범위 밖 안내
    casual-model: claude-haiku-4-5
  crisis:
    # 위기 신호 감지 후 세션이 위기 상태로 유지되는 시간 (sticky, D-012)
    sticky-duration: 30m
  auth:
    # 소셜 로그인 방식 A(D-022): 앱이 받은 제공자 토큰을 검증하고 자체 JWT를 발급
    google:
      # 구글 ID 토큰의 audience 검증에 사용 (앱의 OAuth 클라이언트 ID)
      client-id: ${GOOGLE_CLIENT_ID:}
    kakao:
      # 액세스 토큰으로 카카오 사용자 정보를 조회 (Client Secret 불필요)
      user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
    jwt:
      # 미설정 시 임시 키로 부팅(재시작하면 기존 토큰 무효). 운영에선 32바이트 이상 secret 필수
      secret: ${JWT_SECRET:}
      ttl: ${JWT_TTL:P30D}
